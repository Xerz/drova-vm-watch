services:
  obs-rtmp:
    build:
      context: .
    image: obs-rtmp:local
    container_name: obs-rtmp
    env_file: .env
    environment:
      RECORD_PATH: /recordings
    ports:
      - "${RTMP_PORT:-1935}:1935"
    volumes:
      - ${HOST_RECORD_PATH:-./recordings}:/recordings
    restart: unless-stopped
